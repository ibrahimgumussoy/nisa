<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa'ya Özel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animate"></div>
    <div class="main-card">
        <div class="profile-area">
            <div class="avatar">N</div>
            <h2>Özür Dilerim Nisa...</h2>
        </div>
        
        <div class="message-content">
            <p>Seni kırmak hayatımda isteyeceğim en son şey. Lütfen beni affet</p>
            <p class="highlight">BARIŞYOZZ MUUU</p>
        </div>

        <div class="action-area">
            <button id="yesBtn" class="glow-button">EVET BARIŞTIK ✨</button>
            <button id="noBtn" class="outline-button" onmouseover="moveButton()">Hayır</button>
        </div>

        <div id="finalMessage" class="hidden-panel">
            <div class="success-icon">🎉</div>
            <h3>Beni kırmayacağını biliyordum</h3>
            <p>O zaman Sivasta buluşuyoruzz. Sana sürprizim var balımm.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
